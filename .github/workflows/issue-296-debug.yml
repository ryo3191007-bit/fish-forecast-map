name: Issue 296 Debug

on:
  push:
    branches:
      - agent/issue-296-audit-remaining-coordinates
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture full test output
        run: |
          mkdir -p artifacts
          set +e
          npm test > artifacts/issue-296-debug.log 2>&1
          echo $? > artifacts/issue-296-exit-code.txt
          tail -200 artifacts/issue-296-debug.log
      - uses: actions/upload-artifact@v4
        with:
          name: issue-296-debug
          path: artifacts/issue-296-*
          if-no-files-found: error
