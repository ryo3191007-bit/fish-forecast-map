name: Supabase Baseline Bootstrap

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: supabase-baseline-bootstrap
  cancel-in-progress: false

env:
  BOOTSTRAP_VERSIONS: '20260711122931 20260711125501'

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Verify repository bootstrap prerequisites
        run: |
          set -euo pipefail
          test -f supabase/migrations/20260711122931_remote_schema.sql
          test -f supabase/migrations/20260711125501_align_remote_acl_and_function.sql
          if [ -f supabase/migrations/.remote-history-synced ]; then
            echo "::error::Remote history is already marked as synchronized."
            exit 1
          fi
          npm run test:migration-safety
          npm run check:migration-safety
      - name: Verify required secrets are configured
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          set -euo pipefail
          for secret_name in SUPABASE_ACCESS_TOKEN SUPABASE_DB_PASSWORD SUPABASE_PROJECT_ID; do
            if [ -z "${!secret_name:-}" ]; then
              echo "::error::${secret_name} is not configured in the production environment."
              exit 1
            fi
          done
      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: npx supabase@2.31.8 link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD" --yes
      - name: Inspect and repair bootstrap migration history
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          history_before="$(npx supabase@2.31.8 migration list --linked --password "$SUPABASE_DB_PASSWORD" --yes)"
          printf '%s\n' "$history_before" | tee artifacts/migration-list-before.txt

          versions_in_history="$(printf '%s\n' "$history_before" | grep -Eo '[0-9]{14}' | sort -u || true)"
          for version in $versions_in_history; do
            case " $BOOTSTRAP_VERSIONS " in
              *" $version "*) ;;
              *)
                echo "::error::Unexpected migration version ${version} exists. Refusing automatic repair."
                exit 1
                ;;
            esac
          done

          for version in $BOOTSTRAP_VERSIONS; do
            version_count="$(printf '%s\n' "$history_before" | grep -o "$version" | wc -l | tr -d ' ')"
            if [ "$version_count" = '1' ]; then
              npx supabase@2.31.8 migration repair "$version" --status applied --linked --password "$SUPABASE_DB_PASSWORD" --yes
            elif [ "$version_count" = '2' ]; then
              echo "Migration ${version} is already present in both local and remote history; continuing idempotently."
            else
              echo "::error::Expected migration ${version} once locally or twice when already repaired; found ${version_count}."
              exit 1
            fi
          done

          history_after="$(npx supabase@2.31.8 migration list --linked --password "$SUPABASE_DB_PASSWORD" --yes)"
          printf '%s\n' "$history_after" | tee artifacts/migration-list-after.txt
          for version in $BOOTSTRAP_VERSIONS; do
            repaired_count="$(printf '%s\n' "$history_after" | grep -o "$version" | wc -l | tr -d ' ')"
            if [ "$repaired_count" != '2' ]; then
              echo "::error::Migration ${version} is not synchronized after repair."
              exit 1
            fi
          done
      - name: Verify public schema has no drift after history repair
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          npx supabase@2.31.8 db diff --linked --schema public --yes > artifacts/post-repair-schema-diff.sql
          if grep -q '[^[:space:]]' artifacts/post-repair-schema-diff.sql; then
            echo "::error::Schema drift remains after bootstrap repair. Refusing to enable production db push."
            cat artifacts/post-repair-schema-diff.sql
            exit 1
          fi
          echo '-- No schema drift found.' > artifacts/post-repair-schema-diff.sql
      - name: Create synchronization marker pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          branch="automation/supabase-history-synced-${GITHUB_RUN_ID}"
          versions_csv="${BOOTSTRAP_VERSIONS// /,}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          cat > supabase/migrations/.remote-history-synced <<EOF
          bootstrap_versions=${versions_csv}
          verification_run=${GITHUB_RUN_ID}
          verified_commit=${GITHUB_SHA}
          EOF
          git add supabase/migrations/.remote-history-synced
          git commit -m "Mark Supabase remote migration history synchronized"
          git push origin "$branch"
          gh pr create \
            --base main \
            --head "$branch" \
            --title "Enable synchronized Supabase migration deployment" \
            --body "Issue #92 final bootstrap. Bootstrap migrations ${versions_csv} were marked applied in the linked production project, local and remote migration history matched, and a read-only public-schema diff returned no drift. Merging this marker enables the guarded production migration workflow."
      - name: Upload bootstrap verification results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supabase-baseline-bootstrap
          path: artifacts/
          if-no-files-found: warn
          retention-days: 7
