name: Supabase Remote History Check

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-remote-history-check
  cancel-in-progress: false

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Verify required secrets are configured
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          set -euo pipefail
          for secret_name in SUPABASE_ACCESS_TOKEN SUPABASE_DB_PASSWORD SUPABASE_PROJECT_ID; do
            if [ -z "${!secret_name:-}" ]; then
              echo "::error::${secret_name} is not configured in the production environment."
              exit 1
            fi
          done
      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: npx supabase@2.31.8 link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD" --yes
      - name: Collect remote migration history
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          npx supabase@2.31.8 migration list --linked --password "$SUPABASE_DB_PASSWORD" --yes | tee artifacts/migration-list.txt
      - name: Generate read-only schema diff
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          npx supabase@2.31.8 db diff --linked --schema public --yes > artifacts/remote-schema-diff.sql
          if [ ! -s artifacts/remote-schema-diff.sql ]; then
            echo "-- No schema changes found." > artifacts/remote-schema-diff.sql
          fi
      - name: Upload bootstrap inspection results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supabase-remote-history
          path: artifacts/
          if-no-files-found: warn
          retention-days: 7
