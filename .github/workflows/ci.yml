name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee test.log
      - name: Upload failing test log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bathymetry-test-log
          path: test.log
      - run: npm run build
