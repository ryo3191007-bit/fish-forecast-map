name: Supabase Production Migration Deploy

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/*.sql'
      - 'supabase/migrations/**/*.sql'
      - 'supabase/migrations/.remote-history-synced'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: supabase-production-migrations
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Report deployment pending
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state='pending' \
            -f context='supabase/production-migrations' \
            -f description='Checking and applying pending Supabase migrations'
      - name: Safety gate for initial remote history bootstrap
        run: |
          if [ ! -f supabase/migrations/.remote-history-synced ]; then
            echo "Remote migration history is not marked as synchronized. Refusing production db push."
            echo "Complete docs/SUPABASE_SETUP_PLAN.md bootstrap steps first."
            exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Test migration safety checker
        run: npm run test:migration-safety
      - name: Check repository migrations
        run: npm run check:migration-safety
      - name: Verify required secrets are configured
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          set -euo pipefail
          for secret_name in SUPABASE_ACCESS_TOKEN SUPABASE_DB_PASSWORD SUPABASE_PROJECT_ID; do
            if [ -z "${!secret_name:-}" ]; then
              echo "::error::${secret_name} is not configured in the production environment."
              exit 1
            fi
          done
      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: npx supabase@2.31.8 link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD" --yes
      - name: Show migration history before push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: npx supabase@2.31.8 migration list --linked --password "$SUPABASE_DB_PASSWORD" --yes
      - name: Dry-run pending migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: npx supabase@2.31.8 db push --linked --dry-run --password "$SUPABASE_DB_PASSWORD" --yes
      - name: Push pending migrations only
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: npx supabase@2.31.8 db push --linked --password "$SUPABASE_DB_PASSWORD" --yes
      - name: Report deployment success
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state='success' \
            -f context='supabase/production-migrations' \
            -f description='Migration dry-run and push completed successfully'
      - name: Report deployment failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state='failure' \
            -f context='supabase/production-migrations' \
            -f description='Supabase migration workflow failed; inspect Actions logs'
