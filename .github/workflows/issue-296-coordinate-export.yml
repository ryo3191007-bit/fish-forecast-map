name: Issue 296 Coordinate Export

on:
  push:
    branches:
      - agent/issue-296-audit-remaining-coordinates
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  c09:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect official MLIT download page
        run: |
          mkdir -p artifacts
          curl --fail --location --retry 3 'https://nlftp.mlit.go.jp/ksj/gml/datalist/KsjTmplt-C09.html' --output artifacts/C09-download-page.html
          grep -oE '.{0,180}C09-06_GML\.zip.{0,180}' artifacts/C09-download-page.html > artifacts/C09-download-link-context.txt || true
          cat artifacts/C09-download-link-context.txt
      - uses: actions/upload-artifact@v4
        with:
          name: issue-296-c09-page
          path: |
            artifacts/C09-download-page.html
            artifacts/C09-download-link-context.txt
          if-no-files-found: error

  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Export remaining coordinate evidence
        run: npx tsx scripts/issue-296-coordinate-export.test.mts
      - uses: actions/upload-artifact@v4
        with:
          name: issue-296-coordinate-export
          path: artifacts/issue-296-coordinate-export.json
          if-no-files-found: error
