name: Issue 296 Coordinate Export

on:
  push:
    branches:
      - agent/issue-296-audit-remaining-coordinates
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Export remaining coordinate evidence
        run: npx tsx scripts/issue-296-coordinate-export.test.mts
